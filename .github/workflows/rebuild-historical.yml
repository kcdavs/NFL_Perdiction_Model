name: Rebuild Historical Odds Data

on:
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas

      - name: Scrape all historical weeks
        run: |
          python - <<'EOF'
          import subprocess
          import time

          # Weeks per year: 2018-2020 had 21 weeks (no week 18), 2021+ have 22
          schedule = {
            2018: 21,
            2019: 21,
            2020: 21,
            2021: 22,
            2022: 22,
            2023: 22,
            2024: 22,
          }

          for year, max_week in schedule.items():
              for week in range(1, max_week + 1):
                  print(f"--- {year} Week {week} ---", flush=True)
                  result = subprocess.run(
                      ["python", "scrapers/lines_scraper/scrape.py", str(year), str(week)],
                      capture_output=True, text=True
                  )
                  if result.returncode == 0:
                      print(result.stdout.strip(), flush=True)
                  else:
                      print(f"FAILED: {result.stderr.strip()}", flush=True)
                  time.sleep(1.5)
          EOF

      - name: Commit and push all CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/odds/
          git diff --cached --quiet || git commit -m "Rebuild historical odds data (2018-2024)"
          git push
